    <style>
      /* Critical CSS for immediate rendering - LCP optimization */
      * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
      }
      
      html {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      body { 
        background-color: hsl(210 20% 98%);
        color: hsl(222.2 84% 4.9%);
        font-family: inherit;
      }
      
      #root { 
        min-height: 100vh; 
        display: flex; 
        flex-direction: column; 
      }
      
      /* Critical layout styles for immediate visual content */
      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }
      
      /* Critical header styles for immediate LCP */
      header {
        background-color: hsl(221 70% 15%);
        color: hsl(210 40% 98%);
        padding: 1rem 0;
        border-bottom: 1px solid hsl(221 65% 25%);
        will-change: transform;
      }
      
      /* Critical logo container styles */
      .logo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
      }
      
      /* Critical layout components for above-the-fold */
      .flex { display: flex; }
      .flex-col { flex-direction: column; }
      .items-center { align-items: center; }
      .justify-between { justify-content: space-between; }
      .gap-1 { gap: 0.25rem; }
      .gap-4 { gap: 1rem; }
      .w-full { width: 100%; }
      .w-auto { width: auto; }
      .h-16 { height: 4rem; }
      .object-contain { object-fit: contain; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
      .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
      .p-6 { padding: 1.5rem; }
      .mb-6 { margin-bottom: 1.5rem; }
      .text-center { text-align: center; }
      .text-white { color: white; }
      .bg-white { background-color: white; }
      .rounded-lg { border-radius: 0.5rem; }
      .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
      
      /* Critical button styles with optimized rendering */
      button, .btn {
        font-family: inherit;
        border: none;
        cursor: pointer;
        border-radius: 0.375rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        transition: background-color 0.15s ease;
        background-color: hsl(221 70% 15%);
        color: hsl(210 40% 98%);
        will-change: background-color;
        font-display: swap;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      
      button:hover, .btn:hover {
        background-color: hsl(221 76% 22%);
      }
      
      /* Critical navigation styles */
      nav {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      
      nav a {
        color: hsl(210 40% 98%);
        text-decoration: none;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        transition: background-color 0.15s ease;
      }
      
      nav a:hover {
        background-color: hsl(221 76% 22%);
      }
      
      /* Critical loading animation for immediate FCP */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .loading-spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid hsl(214.3 31.8% 91.4%);
        border-radius: 50%;
        border-top-color: hsl(221 70% 15%);
        animation: spin 1s linear infinite;
        will-change: transform;
      }
      
      /* Critical text styles with font optimization */
      h1, h2, h3 {
        color: hsl(222.2 84% 4.9%);
        font-weight: 600;
        line-height: 1.2;
        font-display: swap;
      }
      
      h1 { 
        font-size: 1.875rem; 
        font-weight: 700;
      }
      h2 { 
        font-size: 1.5rem; 
        font-weight: 600;
      }
      h3 { 
        font-size: 1.25rem; 
        font-weight: 500;
      }
      
      /* Initial app shell optimized for LCP */
      .app-shell {
        min-height: 100vh;
        background-color: hsl(210 20% 98%);
        contain: layout style paint;
      }
      
      /* Main content area optimization */
      main {
        flex: 1;
        contain: layout style;
      }
      
      /* Optimize font rendering */
      .font-display-swap {
        font-display: swap;
      }
      
      /* Ensure text remains visible during webfont load */
      .font-loading {
        font-display: swap;
        visibility: visible;
      }
      
      /* Optimize largest contentful paint element */
      .lcp-optimized {
        font-display: swap;
        contain: layout style paint;
        will-change: auto;
      }
    </style>
